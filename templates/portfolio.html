{% extends "base.html" %}
{% load static %}

{% block title %}うちごはんプランナー | Portfolio{% endblock %}

{% block content %}
<div class="portfolio-page">
    <section class="portfolio-hero">
        <h1 class="portfolio-title">うちごはんプランナー</h1>

        <p class="portfolio-lead">
            献立作成から買い物、食材管理までを一元化し
            日々の料理を効率化する家庭向け料理管理アプリです
        </p>

        <p class="portfolio-subtext">
            献立を作成すると必要な食材を抽出し
            おうち食材にないものだけを買い物リスト化できます
        </p>

        <div class="portfolio-image-grid">
            <div class="portfolio-image-card">
                <img src="{% static 'docs/images/home_3.png' %}" alt="ホーム画面" class="portfolio-image">
                <p class="portfolio-image-label">ホーム画面</p>
            </div>

            <div class="portfolio-image-card">
                <img src="{% static 'docs/images/menu_3.png' %}" alt="献立画面" class="portfolio-image">
                <p class="portfolio-image-label">献立画面</p>
            </div>

            <div class="portfolio-image-card">
                <img src="{% static 'docs/images/shopping_3.png' %}" alt="買い物リスト画面" class="portfolio-image">
                <p class="portfolio-image-label">買い物リスト画面</p>
            </div>
        </div>

        <section class="portfolio-links-section">
            <h2 class="portfolio-links-title">資料</h2>

            <div class="portfolio-links">
                <a href="#" class="portfolio-link-button">企画書</a>
                <a href="#" class="portfolio-link-button">画面設計図</a>
                <a href="#" class="portfolio-link-button">画面遷移図</a>
                <a href="#" class="portfolio-link-button">ER図</a>
            </div>
        </section>

        <div class="portfolio-action">
            <a href="{% url 'accounts:login' %}" class="save-button portfolio-app-button">アプリへ</a>
        </div>
    </section>
</div>
{% endblock %}
