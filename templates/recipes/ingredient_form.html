{% extends "base.html" %}

{% block content %}

<h1>
     {% if form.instance.pk %}
        編集
    {% else %}
        ＋材料を追加
    {% endif %}
</h1>

<p>レシピ名：{{ recipe.recipe_name }}</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">保存</button>
</form>

<p>
    <a href="{% url 'recipes:recipe_detail' recipe.id %}">レシピ詳細に戻る</a>
</p>

{% endblock %}
