{% extends "base.html" %}

{% block content %}

<h1>{{ recipe.recipe_name }}</h1>

<p>作る量{{ recipe.servings }}人前</p>

<p>作成日{{ recipe.create_at }}</p>

<p>
    <a href="{% url 'recipes:recipe_update' recipe.id %}">編集</a>
</p>

<p>
    <a href="{% url 'recipes:recipe_list' %}">マイレシピ一覧に戻る</a>
</p>

{% endblock %}
