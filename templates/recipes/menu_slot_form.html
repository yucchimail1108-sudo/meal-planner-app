{% extends "base.html" %}

{% block content %}

<div class="slot-search-panel">

    <form method="get" action="" class="slot-search-form">
        <input type="hidden" name="source" value="{{ source }}">
        <input type="hidden" name="plan_date" value="{{ plan_date }}">
        <input type="text" name="q" value="{{ q }}" placeholder="レシピ名で検索">
        <button type="submit" class="save-button">検索</button>
    </form>

    <form method="post" action="" id="recipe-select-form">
        <input type="hidden" name="source" value="{{ source }}">
        <input type="hidden" name="plan_date" value="{{ plan_date }}">
        {% csrf_token %}

        {% if recipes %}
            <input
                type="hidden"
                name="recipe_id"
                id="selected-recipe-id"
                value="{% if slot.recipe %}{{ slot.recipe.id }}{% endif %}"
            >

            <ul class="recipe-select-list">
                {% for recipe in recipes %}
                    <li
                        class="recipe-select-item {% if slot.recipe and slot.recipe.id == recipe.id %}selected{% endif %}"
                        data-recipe-id="{{ recipe.id }}"
                    >
                        {{ recipe.recipe_name }}
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p class="slot-search-empty">該当するレシピがありません</p>
        {% endif %}
    </form>
</div>

{% endblock %}
