{% extends "base.html" %}

{% block content %}

<h1>マイレシピ一覧</h1>

<p>
    <a href="{% url 'recipes:recipe_create' %}">レシピを登録する</a>
</p>

<ul>
{% for recipe in recipes %}
<li>
    <a href="{% url 'recipes:recipe_detail' recipe.id %}">
    {{ recipe.recipe_name }}
    </a>

{% if recipe.menu_category %}
    【{{ recipe.get_menu_category_display }}】
{% endif %}
    ({{ recipe.servings }}人前)
</li>
{% endfor %}
</ul>

{% endblock %}
