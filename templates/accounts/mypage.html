{% extends "base.html" %}

{% block content %}
<div class="page-container mypage-page">
    <div class="content-card mypage-card">
        <h1 class="page-title mypage-title">マイページ</h1>

        <p class="mypage-user-name">
            ニックネーム：{{ request.user.first_name|default:"未設定" }}
        </p>

        <div class="mypage-menu">
            <a href="{% url 'accounts:nickname_change' %}" class="mypage-menu-item">
                ニックネーム変更
            </a>

            <a href="{% url 'accounts:email_change' %}" class="mypage-menu-item">
                メールアドレス変更
            </a>

            <a href="{% url 'accounts:password_change' %}" class="mypage-menu-item">
                パスワード変更
            </a>
        </div>
    </div>
</div>
{% endblock %}
