{% extends "base.html" %}

{% block content %}
<div class="page-container auth-page">
    <div class="content-card auth-card">
        <h1 class="page-title auth-title">パスワード変更</h1>

        {% if form.non_field_errors %}
            <div class="error-box">
                {% for error in form.non_field_errors %}
                    <p>{{ error }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="post" class="auth-form">
            {% csrf_token %}

            <div class="auth-form-group">
                <label>現在のパスワード</label>
                {{ form.current_password }}
            </div>

            <div class="auth-form-group">
                <label>新しいパスワード</label>
                {{ form.new_password1 }}
            </div>

            <div class="auth-form-group">
                <label>新しいパスワード（確認）</label>
                {{ form.new_password2 }}
            </div>

            <div class="auth-submit">
                <button type="submit" class="save-button auth-submit-button">変更</button>
                <a href="{% url 'accounts:mypage' %}" class="back-button">戻る</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
