{% extends "base.html" %}

{% block content %}
<div class="page-container">

    <div class="page-header">
        <h1 class="page-title">パスワード変更</h1>
    </div>

    <div class="content-card section-block">
        <form method="post" class="form-block">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group">
                    <label>現在のパスワード</label>
                    {{ form.current_password }}
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>新しいパスワード</label>
                    {{ form.new_password1 }}
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>新しいパスワード再入力</label>
                    {{ form.new_password2 }}
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="save-button">変更</button>
                <a href="{% url 'accounts:mypage' %}" class="back-button">戻る</a>
            </div>
        </form>
    </div>

</div>
{% endblock %}
