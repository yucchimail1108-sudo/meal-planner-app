{% extends "base.html" %}

{% block content %}
<div class="page-container auth-page">
    <div class="content-card auth-card">
        <h1 class="page-title auth-title">ニックネーム変更</h1>

        <form method="post" class="auth-form">
            {% csrf_token %}

            <div class="auth-form-group">
                <label>現在のニックネーム</label>
                <p class="auth-current-text">{{ current_nickname }}</p>
            </div>

            <div class="auth-form-group">
                <label for="{{ form.new_first_name.id_for_label }}">新しいニックネーム</label>
                {{ form.new_first_name }}
            </div>

            <div class="auth-submit">
                <button type="submit" class="save-button auth-submit-button">変更</button>
                <a href="{% url 'accounts:mypage' %}" class="back-button">戻る</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
