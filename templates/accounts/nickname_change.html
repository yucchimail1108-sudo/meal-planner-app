{% extends "base.html" %}

{% block content %}
<div class="page-container">

    <div class="page-header">
        <h1 class="page-title">ニックネーム変更</h1>
    </div>

    <div class="content-card section-block">
        <form method="post" class="form-block">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group">
                    <label>現在のニックネーム</label>
                    <p class="section-text">{{ current_nickname }}</p>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="{{ form.new_first_name.id_for_label }}">新しいニックネーム</label>
                    {{ form.new_first_name }}
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="save-button">変更</button>
                <a href="{% url 'accounts:mypage' %}" class="back-button">戻る</a>
            </div>
        </form>
    </div>

</div>
{% endblock %}
