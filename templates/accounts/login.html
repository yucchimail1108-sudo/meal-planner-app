{% extends "base.html" %}

{% block content %}
<h1>ログイン画面</h1>

{% if form.non_field_errors %}
    <ul>
        {% for error in form.non_field_errors %}
            <li>{{ error }}</li>
        {% endfor %}
    </ul>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">ログイン</button>
</form>

<p><a href="{% url 'accounts:signup' %}">新規アカウント登録</a></p>
<p><a href="#">パスワードを忘れた方はこちら</a></p>
{% endblock %}
