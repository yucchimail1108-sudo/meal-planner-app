{% extends "base.html" %}

{% block content %}
<div class="page-container auth-page">
    <div class="content-card auth-card">
        <h1 class="page-title auth-title">パスワード再設定</h1>

        <p class="auth-guide-text">
            登録したメールアドレスを入力してください
        </p>

        <form method="post" class="auth-form">
            {% csrf_token %}

            <div class="auth-form-group">
                <label for="{{ form.email.id_for_label }}">メールアドレス</label>
                {{ form.email }}
                {% if form.email.errors %}
                    <div class="field-error">
                        {% for error in form.email.errors %}
                            <p>{{ error }}</p>
                        {% endfor %}
                    </div>
                {% endif %}
            </div>

            <div class="auth-submit">
                <button type="submit" class="save-button auth-submit-button">送信</button>
                <a href="{% url 'accounts:login' %}" class="back-button">戻る</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
